services:
  agent-smithers:
    container_name: agent-smithers
    image: agent-smithers:latest
    user: "YOUR UID:YOUR GID"
    network_mode: host
    volumes:
      - ./.env:/data/.env:ro
      - ./store:/data/store
      - ./images:/data/images
    command: ["agent-smithers", "--env-file", "/data/.env", "--store-path", "/data/store", "--log-level", "INFO"]
